const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const view = {cx:0.5, cy:0.5, zoom:1};
let W=0,H=0,drag=null;
let labelBoxes=[];
const tileCache=new Map();
const world={
  mx0:mercX(D.bounds.lonMin),
  mx1:mercX(D.bounds.lonMax),
  my0:mercY(D.bounds.latMax),
  my1:mercY(D.bounds.latMin)
};

function resize(){const r=canvas.getBoundingClientRect();W=canvas.width=Math.round(r.width*devicePixelRatio);H=canvas.height=Math.round(r.height*devicePixelRatio);draw();}
function px(x,y){const span=1/view.zoom;return [(x-view.cx+span/2)*view.zoom*W,(y-view.cy+span/2)*view.zoom*H];}
function norm(mx,my){const span=1/view.zoom;return [mx*devicePixelRatio/(view.zoom*W)+view.cx-span/2,my*devicePixelRatio/(view.zoom*H)+view.cy-span/2];}
function clamp(){const span=1/view.zoom, half=span/2, pad=.2;view.cx=Math.max(-pad+half,Math.min(1+pad-half,view.cx));view.cy=Math.max(-pad+half,Math.min(1+pad-half,view.cy));}
function mercX(lon){return (lon+180)/360;}
function mercY(lat){lat=Math.max(Math.min(Number(lat),85),-85);const lr=lat*Math.PI/180;return .5-Math.log(Math.tan(Math.PI/4+lr/2))/(2*Math.PI);}
function drawMapTiles(){
  const span=1/view.zoom, leftN=view.cx-span/2, rightN=view.cx+span/2, topN=view.cy-span/2, botN=view.cy+span/2;
  const mx0=world.mx0+leftN*(world.mx1-world.mx0), mx1=world.mx0+rightN*(world.mx1-world.mx0);
  const my0=world.my0+topN*(world.my1-world.my0), my1=world.my0+botN*(world.my1-world.my0);
  const mSpan=Math.max(mx1-mx0,my1-my0), cssMax=Math.max(canvas.clientWidth||1,canvas.clientHeight||1);
  const z=Math.max(1,Math.min(19,Math.round(Math.log2(cssMax/(256*mSpan)))));
  const n=2**z, x0=Math.floor(mx0*n), x1=Math.floor(mx1*n), y0=Math.floor(my0*n), y1=Math.floor(my1*n);
  ctx.save();ctx.fillStyle='#d9d5ca';ctx.fillRect(0,0,W,H);ctx.globalAlpha=.88;
  for(let tx=x0;tx<=x1;tx++){
    if(tx<0||tx>=n)continue;
    for(let ty=y0;ty<=y1;ty++){
      if(ty<0||ty>=n)continue;
      const key=`${z}/${tx}/${ty}`;
      let img=tileCache.get(key);
      if(!img){
        img=new Image();img.crossOrigin='anonymous';img.onload=draw;img.src=`https://tile.openstreetmap.org/${z}/${tx}/${ty}.png`;tileCache.set(key,img);
      }
      const sx=(tx/n-mx0)/(mx1-mx0)*W, sy=(ty/n-my0)/(my1-my0)*H;
      const ex=((tx+1)/n-mx0)/(mx1-mx0)*W, ey=((ty+1)/n-my0)/(my1-my0)*H;
      if(img.complete&&img.naturalWidth)ctx.drawImage(img,sx,sy,ex-sx+1,ey-sy+1);
    }
  }
  ctx.restore();
}
function boxesOverlap(a,b){return !(a.x1<b.x0||a.x0>b.x1||a.y1<b.y0||a.y0>b.y1);}
function reserveLabel(text,x,y,color,opts={}){
  const fontPx=(opts.fontPx||12)*devicePixelRatio,pad=3*devicePixelRatio,gap=(opts.gap||12)*devicePixelRatio;
  ctx.font=`${fontPx}px system-ui`;
  const w=ctx.measureText(text).width+pad*2,h=fontPx+pad*2;
  const tries=[
    [gap,-gap-h,'left'],[gap,gap,'left'],[-gap-w,-gap-h,'left'],[-gap-w,gap,'left'],
    [-w/2,-gap-h,'center'],[-w/2,gap,'center'],[gap*1.4,-h/2,'left'],[-gap*1.4-w,-h/2,'left']
  ];
  for(const [dx,dy] of tries){
    const box={x0:x+dx,y0:y+dy,x1:x+dx+w,y1:y+dy+h};
    if(box.x0<0||box.y0<0||box.x1>W||box.y1>H)continue;
    if(labelBoxes.some(b=>boxesOverlap(box,b)))continue;
    labelBoxes.push(box);
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.82)';
    ctx.strokeStyle='rgba(255,255,255,.55)';
    ctx.lineWidth=1*devicePixelRatio;
    ctx.beginPath();
    ctx.roundRect(box.x0,box.y0,w,h,4*devicePixelRatio);
    ctx.fill();ctx.stroke();
    ctx.fillStyle=color;
    ctx.textAlign=opts.align||'left';
    ctx.textBaseline='middle';
    ctx.fillText(text,box.x0+pad,box.y0+h/2);
    ctx.restore();
    return true;
  }
  return false;
}
function drawGrid(){
  ctx.save();ctx.strokeStyle='rgba(80,76,68,.25)';ctx.fillStyle='rgba(65,62,56,.65)';ctx.lineWidth=1*devicePixelRatio;ctx.font=`${11*devicePixelRatio}px system-ui`;
  for(const g of D.grid.latLines){const [,y]=px(0,g.y);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.fillText(g.label,8*devicePixelRatio,y-4*devicePixelRatio);}
  for(const g of D.grid.lonLines){const [x,]=px(g.x,0);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.fillText(g.label,x+4*devicePixelRatio,H-8*devicePixelRatio);}
  ctx.restore();
}
function drawPoints(){
  ctx.save();ctx.globalAlpha=.42;
  for(const p of D.points){const [x,y]=px(p.x,p.y);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(x,y,2.2*devicePixelRatio,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function drawErrorLines(){
  ctx.save();ctx.globalAlpha=.72;ctx.lineWidth=1.5*devicePixelRatio;ctx.setLineDash([6*devicePixelRatio,4*devicePixelRatio]);
  for(const l of D.errorLines){const [x0,y0]=px(l.x0,l.y0),[x1,y1]=px(l.x1,l.y1);ctx.strokeStyle='rgba(190,45,35,.85)';ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();}
  ctx.restore();
}
function drawSites(){
  ctx.save();ctx.lineWidth=2.5*devicePixelRatio;ctx.font=`${12*devicePixelRatio}px system-ui`;
  const sites=[...D.sites].sort((a,b)=>b.n-a.n);
  for(const s of sites){const [x,y]=px(s.x,s.y);ctx.fillStyle=s.color;ctx.strokeStyle='#111';ctx.beginPath();ctx.arc(x,y,8*devicePixelRatio,0,Math.PI*2);ctx.fill();ctx.stroke();reserveLabel(s.cgi,x,y,'#111');}
  ctx.restore();
}
function drawKnownSites(){
  ctx.save();ctx.lineWidth=2*devicePixelRatio;ctx.font=`${12*devicePixelRatio}px system-ui`;
  const known=[...D.knownSites].sort((a,b)=>(a.matched===b.matched?0:(a.matched?1:-1)));
  for(const k of known){
    const [x,y]=px(k.x,k.y),r=(k.matched?7:5)*devicePixelRatio;
    ctx.fillStyle=k.matched?'#fff':'rgba(31,41,51,.85)';
    ctx.strokeStyle=k.matched?'#BE2D23':'#fff';
    ctx.fillRect(x-r,y-r,r*2,r*2);ctx.strokeRect(x-r,y-r,r*2,r*2);
    if(k.matched)reserveLabel(`known ${k.enodebid}`,x,y,'#BE2D23');
  }
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  if(document.getElementById('showMap').checked) drawMapTiles();
  else {ctx.fillStyle='#e8e4dc';ctx.fillRect(0,0,W,H);}
  labelBoxes=[];
  if(document.getElementById('showGrid').checked) drawGrid();
  if(document.getElementById('showPts').checked) drawPoints();
  if(document.getElementById('showErr').checked) drawErrorLines();
  if(document.getElementById('showSites').checked) drawSites();
  if(document.getElementById('showKnown').checked) drawKnownSites();
}
function nearestSite(mx,my){
  let best=null,bestD=Infinity;
  for(const s of D.sites){const [x,y]=px(s.x,s.y);const d=Math.hypot(x/devicePixelRatio-mx,y/devicePixelRatio-my);if(d<bestD){best=s;bestD=d;}}
  return bestD<=18?best:null;
}
function nearestKnown(mx,my){
  let best=null,bestD=Infinity;
  for(const k of D.knownSites){const [x,y]=px(k.x,k.y);const d=Math.hypot(x/devicePixelRatio-mx,y/devicePixelRatio-my);if(d<bestD){best=k;bestD=d;}}
  return bestD<=18?best:null;
}
canvas.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cx:view.cx,cy:view.cy};canvas.classList.add('dragging');});
addEventListener('mouseup',()=>{drag=null;canvas.classList.remove('dragging');});
addEventListener('mousemove',e=>{
  if(drag){const span=1/view.zoom;view.cx=drag.cx-(e.clientX-drag.x)/canvas.clientWidth*span;view.cy=drag.cy-(e.clientY-drag.y)/canvas.clientHeight*span;clamp();draw();return;}
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top, k=nearestKnown(mx,my), s=nearestSite(mx,my), tip=document.getElementById('tip');
  if(k){
    const matchInfo=k.matched?`<br>sector: ${k.sectorId}<br>CGI: ${k.cgi}<br>estimate error: ${k.errorM} m`:'<br>no matching estimate in this dataset';
    tip.style.display='block';tip.innerHTML=`<b>Known cell ${k.enodebid}</b><br>lat/lon: ${k.lat}, ${k.lon}${matchInfo}`;return;
  }
  if(!s){tip.style.display='none';return;}
  const taFit=s.taRmse==null?'not used':`${s.taRmse} m RMSE, ${s.taP90} m p90 residual`;
  tip.style.display='block';tip.innerHTML=`<b>${s.cgi}</b>method: ${s.method}<br>lat/lon: ${s.lat}, ${s.lon}<br>observations: ${s.n}<br>TA observations: ${s.nTa} (${s.nTaValues} values)<br>TA fit: ${taFit}<br>max RSRP: ${s.maxRsrp} dBm<br>top-observation p90 radius: ${s.topRadius} m`;
});
canvas.addEventListener('wheel',e=>{e.preventDefault();const before=norm(e.offsetX,e.offsetY);view.zoom=Math.max(.75,Math.min(80,view.zoom*(e.deltaY<0?1.18:.85)));const after=norm(e.offsetX,e.offsetY);view.cx+=before[0]-after[0];view.cy+=before[1]-after[1];clamp();draw();},{passive:false});
canvas.addEventListener('dblclick',()=>{view.cx=.5;view.cy=.5;view.zoom=1;draw();});
for(const id of ['showMap','showPts','showErr','showKnown','showSites','showGrid']) document.getElementById(id).addEventListener('change',draw);
document.getElementById('legendRows').innerHTML=`<div class="row"><span class="dot" style="background:#1f2933;border-radius:0"></span><span>known cell catalogue</span></div><div class="row"><span class="dot" style="background:#fff;border:2px solid #BE2D23;border-radius:0"></span><span>known location with estimate</span></div><div class="row"><span style="display:inline-block;width:18px;border-top:2px dashed #BE2D23"></span><span>estimate error line</span></div>` + D.sites.map(s=>`<div class="row"><span class="dot" style="background:${s.color}"></span><span>${s.cgi} - ${s.method === 'ta_range_fit' ? 'TA fit' : 'centroid'} - ${s.n} obs</span></div>`).join('');
addEventListener('resize',resize);resize();
</script>
