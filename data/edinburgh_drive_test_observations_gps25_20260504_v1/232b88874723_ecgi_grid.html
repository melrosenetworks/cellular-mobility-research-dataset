const map=L.map('map',{preferCanvas:true,zoomControl:true});
setTimeout(()=>map.invalidateSize(),0);
const bounds=L.latLngBounds(D.bbox);
map.fitBounds(bounds.pad(0.04));
L.rectangle(bounds,{color:'#222',weight:1.4,fill:false,dashArray:'5 5'}).addTo(map);
const MAP_TYPES={
  none:{label:'None',url:null,options:{}},
  osm:{label:'OpenStreetMap',url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png',options:{
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }},
  hot:{label:'OpenStreetMap HOT',url:'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',options:{
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles style by Humanitarian OpenStreetMap Team'
  }},
  cartoLight:{label:'Carto Light',url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',options:{
    maxZoom:20,
    subdomains:'abcd',
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }},
  cartoDark:{label:'Carto Dark',url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',options:{
    maxZoom:20,
    subdomains:'abcd',
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }},
  topo:{label:'OpenTopoMap',url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',options:{
    maxZoom:17,
    attribution:'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, SRTM | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a>'
  }}
};
let tileLayer=null;
const mapTypeSelect=document.getElementById('mapType');
Object.entries(MAP_TYPES).forEach(([key,cfg])=>{
  const opt=document.createElement('option');
  opt.value=key;
  opt.textContent=cfg.label;
  if(key===(D.mapType||'osm')) opt.selected=true;
  mapTypeSelect.appendChild(opt);
});
function setMapType(key){
  if(tileLayer){
    tileLayer.remove();
    tileLayer=null;
  }
  const cfg=MAP_TYPES[key] || MAP_TYPES.osm;
  if(cfg.url){
    tileLayer=L.tileLayer(cfg.url,cfg.options).addTo(map);
    tileLayer.bringToBack();
  }
}
setMapType(mapTypeSelect.value);
mapTypeSelect.addEventListener('change',()=>setMapType(mapTypeSelect.value));

document.getElementById('summary').innerHTML =
  `${Number(D.bboxRows).toLocaleString()} observation(s) with valid ${escapeHtml(D.identityColumn)} inside the bbox` +
  `<br>${Number(D.rows).toLocaleString()} x ${Number(D.cols).toLocaleString()} grid, ${fmt(D.cellSizeM)} m squares` +
  `<br>Click a square for distinct ECGI and observation counts.`;
document.getElementById('maxVal').textContent=`${Number(D.maxEcgiCount).toLocaleString()} ECGIs`;
document.getElementById('stats').innerHTML = [
  ['Input rows', D.totalRows],
  ['Rows with valid ECGI + GPS', D.validRows],
  ['Rows inside bbox', D.bboxRows],
  ['Grid squares', D.rows * D.cols],
  ['Non-empty squares', D.nonEmptyCells],
  ['Max ECGIs in a square', D.maxEcgiCount],
  ['Max observations in a square', D.maxObservationCount],
].map(([k,v])=>`<div class="stat"><b>${escapeHtml(k)}</b><span>${Number(v).toLocaleString()}</span></div>`).join('');

const showEmpty=document.getElementById('showEmpty');
const layer=L.layerGroup().addTo(map);
showEmpty.addEventListener('change',renderGrid);
renderGrid();

function renderGrid(){
  layer.clearLayers();
  const max=Math.max(1,Number(D.maxEcgiCount)||1);
  for(const c of D.cells){
    const ecgiCount=Number(c[4])||0;
    if(!showEmpty.checked && ecgiCount===0) continue;
    const rect=L.rectangle([[c[0],c[1]],[c[2],c[3]]],{
      stroke:true,
      color:ecgiCount ? '#23415f' : '#8a8a8a',
      weight:ecgiCount ? 0.65 : 0.35,
      opacity:ecgiCount ? 0.72 : 0.28,
      fill:true,
      fillColor:colourFor(ecgiCount,max),
      fillOpacity:ecgiCount ? 0.58 : 0.10
    });
    rect.bindPopup(popupHtml(c));
    rect.addTo(layer);
  }
}

function popupHtml(c){
  const rows = [
    ['Distinct ECGIs', Number(c[4]).toLocaleString()],
    ['Observations', Number(c[5]).toLocaleString()],
    ['South-west', `${fmt(c[0])}, ${fmt(c[1])}`],
    ['North-east', `${fmt(c[2])}, ${fmt(c[3])}`],
  ].map(([k,v])=>`<b>${escapeHtml(k)}</b><span>${escapeHtml(v)}</span>`).join('');
  const ecgis=(c[6]||[]).map(([ecgi,count]) =>
    `<div class="ecgi-row"><span>${escapeHtml(ecgi)}</span><span>${Number(count).toLocaleString()}</span></div>`
  ).join('');
  return `<div class="popup-grid">${rows}</div>` +
    (ecgis ? `<b>Top ECGIs by observations</b><div class="ecgi-list">${ecgis}</div>` : '<div>No ECGIs observed in this square.</div>');
}

function colourFor(v,max){
  if(v<=0) return '#313695';
  const t=Math.log1p(v)/Math.log1p(max);
  const stops=['#313695','#4575b4','#74add1','#abd9e9','#ffffbf','#fdae61','#f46d43','#d73027','#a50026'];
  const x=Math.max(0,Math.min(1,t))*(stops.length-1);
  const i=Math.min(stops.length-2,Math.floor(x));
  return mix(stops[i],stops[i+1],x-i);
}
function mix(a,b,t){
  const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return `#${hex(r)}${hex(g)}${hex(bl)}`;
}
function hex(n){return n.toString(16).padStart(2,'0');}
function fmt(v){return Number(v).toLocaleString(undefined,{maximumFractionDigits:6});}
function escapeHtml(v){
  return String(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
